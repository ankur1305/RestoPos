<template>
    <div class="receipt-container">
        <template lwc:if={isLoading}>
            <div class="loading">
                <lightning-spinner alternative-text="Loading receipt..." size="medium"></lightning-spinner>
            </div>
        </template>
        <template lwc:else>
            <div class="receipt-head">
                <h3>Receipt Center</h3>
                <p>Download customer-ready invoice formats instantly.</p>
            </div>
            <div class="receipt-actions">
                <button type="button" class="action-btn primary" onclick={handleDownloadReceipt} disabled={isDownloadingAny}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    <template lwc:if={isDownloadingA4}>Opening…</template>
                    <template lwc:else>A4 PDF</template>
                </button>
                <button type="button" class="action-btn secondary" onclick={handleDownloadThermalReceipt} disabled={isDownloadingAny}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
                    <template lwc:if={isDownloadingThermal}>Opening…</template>
                    <template lwc:else>Thermal PDF</template>
                </button>
                <button type="button" class="action-btn secondary" onclick={handleBack}>
                    Back to Tables
                </button>
            </div>
            <p class="popup-hint">If download does not open, enable pop-ups and retry.</p>

            <div class="receipt-wrapper">
                <div class="receipt-paper">
                    <div class="center">
                        <h2>{restaurantName}</h2>
                        <p>{restaurantAddress}</p>
                        <template lwc:if={restaurantPhone}>
                            <p>Tel: {restaurantPhone}</p>
                        </template>
                    </div>
                    <div class="line"></div>
                    <div class="row"><span>Receipt #:</span><span>{receiptNumber}</span></div>
                    <div class="row"><span>Order:</span><span>{orderNumber}</span></div>
                    <div class="row"><span>Table:</span><span>{tableName}</span></div>
                    <div class="row"><span>Date:</span><span>{formattedDate}</span></div>
                    <template lwc:if={hasCustomer}>
                        <div class="line"></div>
                        <div class="row"><span>Customer:</span><span>{customerName}</span></div>
                        <div class="row"><span>Phone:</span><span>{customerPhone}</span></div>
                    </template>
                    <div class="line"></div>
                    <div class="row bold"><span>Item</span><span>Qty</span><span>Amt</span></div>
                    <div class="line"></div>
                    <template for:each={formattedItems} for:item="item">
                        <div key={item.Id} class="row item-row">
                            <span class="item-col-name">{item.Item_Name__c}</span>
                            <span class="item-col-qty">{item.Quantity__c}</span>
                            <span class="item-col-amt">{item.formattedLineTotal}</span>
                        </div>
                    </template>
                    <div class="line"></div>
                    <div class="row"><span>Subtotal:</span><span>{formattedSubtotal}</span></div>
                    <div class="row"><span>Tax:</span><span>{formattedTax}</span></div>
                    <template lwc:if={hasDiscount}>
                        <div class="row"><span>Discount:</span><span>{formattedDiscount}</span></div>
                    </template>
                    <div class="line"></div>
                    <div class="row bold total-line"><span>TOTAL:</span><span>{formattedTotal}</span></div>
                    <div class="line"></div>
                    <div class="center">
                        <p class="thank-you">Thank you for dining with us!</p>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
