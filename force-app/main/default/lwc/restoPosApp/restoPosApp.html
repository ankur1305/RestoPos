<template>
    <div class="restopos-app">
        <template lwc:if={restaurant}>
            <c-pos-header
                restaurant-name={restaurantName}
                restaurant-logo-url={restaurantLogoUrl}
                current-view={currentView}
                onnavigate={handleNavigation}
                onbacktotables={handleBackToTables}
                onrequestmanagerpin={handleRequestManagerPin}
            ></c-pos-header>
        </template>

        <template lwc:if={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading..." size="large"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={error}>
            <div class="error-banner" onclick={handleDismissError}>
                <lightning-icon icon-name="utility:error" variant="inverse" size="x-small"></lightning-icon>
                <span class="error-text">{error}</span>
                <span class="error-dismiss">✕</span>
            </div>
        </template>

        <div class="main-content">
            <template lwc:if={isLoginView}>
                <c-pos-login onlogin={handleLogin}></c-pos-login>
            </template>

            <template lwc:if={isTableView}>
                <c-pos-table-view
                    restaurant-id={restaurant.Id}
                    ontableselect={handleTableSelect}
                ></c-pos-table-view>
            </template>

            <template lwc:if={isOrderView}>
                <c-pos-order-screen
                    restaurant-id={restaurant.Id}
                    table-id={selectedTableId}
                    order-id={selectedOrderId}
                    tax-rate={restaurant.Tax_Rate__c}
                    currency-code={restaurant.Currency_Code__c}
                    onbacktotables={handleBackToTables}
                    onviewreceipt={handleViewReceipt}
                ></c-pos-order-screen>
            </template>

            <template lwc:if={isReceiptView}>
                <c-pos-receipt
                    receipt-id={receiptId}
                    onbacktotables={handleBackToTables}
                ></c-pos-receipt>
            </template>

            <template lwc:if={isManagerView}>
                <c-pos-manager-desktop
                    restaurant-id={restaurant.Id}
                    currency-code={restaurant.Currency_Code__c}
                ></c-pos-manager-desktop>
            </template>
        </div>

        <template lwc:if={showManagerPinModal}>
            <div class="manager-pin-overlay" onclick={closeManagerPinModal}>
                <div class="manager-pin-modal" onclick={stopPropagation}>
                    <h3 class="manager-pin-title">Manager Access</h3>
                    <p class="manager-pin-subtitle">Enter Manager PIN to continue.</p>
                    <lightning-input
                        type="password"
                        label="Manager PIN"
                        value={managerPin}
                        onchange={handleManagerPinInput}
                        onkeyup={handleManagerPinKeyup}
                        maxlength="6"
                        placeholder="Enter 6-digit Manager PIN"
                        inputmode="numeric"
                        message-when-too-long="Manager PIN must be exactly 6 digits."
                    ></lightning-input>
                    <template lwc:if={managerPinError}>
                        <div class="manager-pin-error">{managerPinError}</div>
                    </template>
                    <div class="manager-pin-actions">
                        <button type="button" class="manager-pin-btn manager-pin-cancel" onclick={closeManagerPinModal}>Cancel</button>
                        <button type="button" class="manager-pin-btn manager-pin-submit" onclick={submitManagerPin}>Verify</button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
