<template>
    <div class="customer-input">
        <div class="input-row">
            <div class="phone-field">
                <label class="field-label">Customer Phone</label>
                <div class="input-wrapper">
                    <span class="phone-prefix">+91</span>
                    <input
                        class="field-input has-prefix"
                        type="tel"
                        inputmode="numeric"
                        autocomplete="tel-national"
                        placeholder="10-digit number"
                        title="Enter exactly 10 digits"
                        value={phone}
                        oninput={handlePhoneChange}
                        maxlength="10"
                    />
                </div>
            </div>

            <div class="whatsapp-optin-row">
                <label class="optin-label">
                    <input
                        type="checkbox"
                        checked={whatsappReceiptOptIn}
                        onchange={handleWhatsAppOptInChange}
                    />
                    <span>Send receipt on WhatsApp</span>
                </label>
            </div>

            <template lwc:if={isSearching}>
                <div class="search-status">
                    <span class="search-dot"></span>
                    Searching...
                </div>
            </template>

            <template lwc:if={hasCustomer}>
                <div class="customer-found">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                    <div class="customer-name">{customer.Name}</div>
                    <div class="customer-visits">{visitInfo}</div>
                </div>
            </template>

            <template lwc:if={showNewForm}>
                <div class="new-customer">
                    <input
                        class="field-input name-input"
                        type="text"
                        placeholder="Customer name"
                        value={customerName}
                        oninput={handleNameChange}
                    />
                    <button type="button" class="save-btn" onclick={handleCreateCustomer} disabled={isCreateDisabled}>Save</button>
                </div>
            </template>
        </div>
    </div>
</template>
