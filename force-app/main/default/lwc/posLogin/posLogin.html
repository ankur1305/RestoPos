<template>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg width="52" height="52" viewBox="0 0 48 48" fill="none">
                    <rect x="4" y="4" width="40" height="40" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
                    <path d="M16 32V20a8 8 0 0116 0v12" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M12 28h24" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="20" cy="24" r="1.5" fill="#4f46e5"/>
                    <circle cx="28" cy="24" r="1.5" fill="#4f46e5"/>
                </svg>
            </div>
            <h1 class="login-title">RestoPos</h1>
            <p class="login-subtitle">Restaurant Point of Sale</p>
            <p class="login-helper">Secure staff access for faster table-to-bill workflow.</p>

            <div class="login-form">
                <div class="form-group">
                    <label class="form-label" for="code-input">Restaurant Code</label>
                    <input
                        id="code-input"
                        class="form-input"
                        type="text"
                        value={restaurantCode}
                        placeholder="e.g., TCH001"
                        oninput={handleCodeChange}
                        onkeyup={handleKeyUp}
                        maxlength="10"
                        autocomplete="off"
                    />
                </div>
                <div class="form-group">
                    <label class="form-label" for="pin-input">Staff PIN</label>
                    <input
                        id="pin-input"
                        class="form-input"
                        type="password"
                        value={pin}
                        placeholder="Enter 6-digit PIN"
                        oninput={handlePinChange}
                        onkeyup={handleKeyUp}
                        maxlength="6"
                        inputmode="numeric"
                        pattern="[0-9]*"
                    />
                </div>
                <button class="login-btn" onclick={handleSubmit}>
                    Enter POS
                </button>
            </div>
        </div>
    </div>
</template>
