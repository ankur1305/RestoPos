<template>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2">
                    <path d="M3 3h18v18H3z"></path>
                    <path d="M12 8v8M8 12h8"></path>
                </svg>
            </div>
            <h1 class="login-title">RestoPos</h1>
            <p class="login-subtitle">Restaurant Point of Sale</p>

            <div class="login-form">
                <div class="form-group">
                    <label class="form-label" for="code-input">Restaurant Code</label>
                    <input
                        id="code-input"
                        class="form-input"
                        type="text"
                        value={restaurantCode}
                        placeholder="e.g., TCH001"
                        oninput={handleCodeChange}
                        onkeyup={handleKeyUp}
                        maxlength="10"
                    />
                </div>
                <div class="form-group">
                    <label class="form-label" for="pin-input">Staff PIN</label>
                    <input
                        id="pin-input"
                        class="form-input"
                        type="password"
                        value={pin}
                        placeholder="Enter PIN"
                        oninput={handlePinChange}
                        onkeyup={handleKeyUp}
                        maxlength="6"
                    />
                </div>
                <button class="login-btn" onclick={handleSubmit}>
                    Enter POS
                </button>
            </div>
        </div>
    </div>
</template>
