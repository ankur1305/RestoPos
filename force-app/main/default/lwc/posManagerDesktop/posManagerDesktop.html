<template>
    <template lwc:if={isDesktop}>
        <section class="manager-wrap">
            <div class="manager-card">
                <div class="manager-card-header">
                    <h2>Manager Console</h2>
                </div>
                <div class="toolbar">
                    <div class="manager-head">
                        <h3>Operations Workspace</h3>
                        <p>Manage tables, menu and reporting in one place.</p>
                    </div>
                    <div class="tab-bar">
                        <button type="button" class={tablesTabClass} data-tab="tables" onclick={handleCustomTabChange}>Tables</button>
                        <button type="button" class={menuTabBtnClass} data-tab="menu" onclick={handleCustomTabChange}>Menu</button>
                        <button type="button" class={reportsTabClass} data-tab="reports" onclick={handleCustomTabChange}>Reports</button>
                    </div>
                </div>

                <template lwc:if={isLoading}>
                    <div class="pad loading-bar">
                        <lightning-spinner size="small" alternative-text="Working"></lightning-spinner>
                    </div>
                </template>

                <!-- ═══ TABLES TAB ═══ -->
                <template lwc:if={isTablesTab}>
                    <div class="pad">
                        <div class="section-toolbar">
                            <h4 class="section-toolbar-title">All Tables</h4>
                            <button type="button" class="btn btn-primary btn-sm" onclick={openNewTable}>+ Add Table</button>
                        </div>

                        <div class="transfer-box">
                            <div class="transfer-field">
                                <lightning-combobox label="Source (active order)" options={occupiedTableOptions} value={transferSourceTableId} onchange={handleTransferSourceChange}></lightning-combobox>
                            </div>
                            <div class="transfer-field">
                                <lightning-combobox label="Target (available)" options={availableTableOptions} value={transferTargetTableId} onchange={handleTransferTargetChange}></lightning-combobox>
                            </div>
                            <div class="field-btn-align">
                                <button type="button" class="btn btn-primary" onclick={transferOrderFromSelectors}>Transfer Order</button>
                            </div>
                        </div>
                        <template lwc:if={transferError}>
                            <div class="inline-error">{transferError}</div>
                        </template>

                        <div class="list">
                            <template for:each={tablesDisplay} for:item="table">
                                <div key={table.Id} class="list-item">
                                    <div class="list-item-info">
                                        <span class="item-number-badge">{table.tableNumber}</span>
                                        <span class="list-item-name">{table.Name}</span>
                                        <span class="status-badge">{table.Status__c}</span>
                                        <span class="list-item-meta">Cap {table.Capacity__c}</span>
                                    </div>
                                    <div class="list-item-actions">
                                        <button type="button" class="btn btn-sm btn-outline" data-id={table.Id} onclick={editTable}>Edit</button>
                                        <button type="button" class="btn btn-sm btn-subtle-success" data-id={table.Id} data-status="Reserved" onclick={updateTableStatus}>Reserve</button>
                                        <button type="button" class="btn btn-sm btn-subtle" data-id={table.Id} data-status="Available" onclick={updateTableStatus}>Available</button>
                                        <button type="button" class="btn btn-sm btn-subtle-danger" data-id={table.Id} data-status="Out of Service" onclick={updateTableStatus}>Out of Service</button>
                                    </div>
                                </div>
                            </template>
                            <template lwc:if={tables.length}></template>
                            <template lwc:else>
                                <div class="empty-inline">No tables yet. Click "+ Add Table" to create one.</div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- ═══ MENU TAB ═══ -->
                <template lwc:if={isMenuTab}>
                    <div class="pad">
                        <div class="dual-section">
                            <!-- Categories -->
                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Categories</span>
                                    <button type="button" class="btn btn-sm btn-primary" onclick={openNewCategory}>+ Add</button>
                                </div>
                                <div class="section-card-body list">
                                    <template lwc:if={categoryDeleteError}>
                                        <div class="inline-error">{categoryDeleteError}</div>
                                    </template>
                                    <template for:each={menuCategories} for:item="cat">
                                        <div key={cat.Id} class="list-item compact">
                                            <span class="list-item-name">{cat.Name}</span>
                                            <div class="list-item-actions">
                                                <button type="button" class="btn btn-sm btn-outline" data-id={cat.Id} onclick={editCategory}>Edit</button>
                                                <button type="button" class="btn btn-sm btn-subtle-danger" data-id={cat.Id} onclick={removeCategory}>Delete</button>
                                            </div>
                                        </div>
                                    </template>
                                    <template lwc:if={menuCategories.length}></template>
                                    <template lwc:else>
                                        <div class="empty-inline">No categories found.</div>
                                    </template>
                                </div>
                            </div>

                            <!-- Bulk Actions -->
                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Bulk Availability</span>
                                </div>
                                <div class="section-card-body">
                                    <div class="bulk-row">
                                        <button type="button" class="btn btn-danger" onclick={markAllSoldOut}>Mark All Sold Out</button>
                                        <button type="button" class="btn btn-success" onclick={markAllAvailable}>Reset All Available</button>
                                    </div>
                                    <div class="bulk-row category-sold-row">
                                        <div class="category-filter-field">
                                            <lightning-combobox label="Category" value={selectedCategoryId} options={categoryOptions} onchange={handleCategoryFilter}></lightning-combobox>
                                        </div>
                                        <div class="field-btn-align">
                                            <button type="button" class="btn btn-outline" onclick={markCategorySoldOut}>Mark Category Sold Out</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Menu Items List -->
                        <div class="section-card menu-items-card">
                            <div class="section-card-header">
                                <span>Menu Items</span>
                                <button type="button" class="btn btn-sm btn-primary" onclick={openNewItem}>+ Add Item</button>
                            </div>
                            <div class="section-card-body">
                                <template lwc:if={menuItems.length}>
                                    <div class="menu-grid-head">
                                        <span>#</span>
                                        <span>Item</span>
                                        <span>Price</span>
                                        <span>Category</span>
                                        <span>Status</span>
                                        <span>Actions</span>
                                    </div>
                                    <div class="menu-grid-body">
                                        <template for:each={menuItemsDisplay} for:item="item">
                                            <div key={item.Id} class="menu-grid-row">
                                                <span class="item-number-badge">{item.itemNumber}</span>
                                                <span class="list-item-name">{item.Name}</span>
                                                <lightning-input
                                                    type="number"
                                                    variant="label-hidden"
                                                    step="0.01"
                                                    name="Price__c"
                                                    data-id={item.Id}
                                                    value={item.Price__c}
                                                    onchange={handleInlineItemChange}
                                                ></lightning-input>
                                                <lightning-combobox
                                                    variant="label-hidden"
                                                    name="Menu_Category__c"
                                                    data-id={item.Id}
                                                    value={item.Menu_Category__c}
                                                    options={categoryOptions}
                                                    onchange={handleInlineItemChange}
                                                ></lightning-combobox>
                                                <span class={item.availabilityClass}>{item.availabilityLabel}</span>
                                                <div class="list-item-actions">
                                                    <button type="button" class={item.toggleClass} data-id={item.Id} onclick={toggleItemAvailability} title="Toggle availability">
                                                        <span class="toggle-thumb"></span>
                                                    </button>
                                                    <button type="button" class="btn btn-sm btn-outline" data-id={item.Id} onclick={saveInlineItem}>Save</button>
                                                    <button type="button" class="btn btn-sm btn-outline" data-id={item.Id} onclick={editItem}>Edit</button>
                                                    <button type="button" class="btn btn-sm btn-subtle-danger" data-id={item.Id} onclick={removeItem}>Delete</button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template lwc:else>
                                    <div class="empty-inline">No menu items found.</div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ═══ REPORTS TAB ═══ -->
                <template lwc:if={isReportsTab}>
                    <div class="pad">
                        <div class="report-filters">
                            <div class="filter-field">
                                <lightning-input type="date" label="Start Date" name="startDate" onchange={handleFilterChange}></lightning-input>
                            </div>
                            <div class="filter-field">
                                <lightning-input type="date" label="End Date" name="endDate" onchange={handleFilterChange}></lightning-input>
                            </div>
                            <div class="field-btn-align">
                                <button type="button" class="btn btn-primary" onclick={applyReportFilter}>Apply Filters</button>
                            </div>
                        </div>
                        <div class="kpis">
                            <div class="kpi">
                                <span class="kpi-label">Orders</span>
                                <strong class="kpi-value">{reportData.orderCount}</strong>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Revenue</span>
                                <strong class="kpi-value">{reportData.revenue}</strong>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Discounts</span>
                                <strong class="kpi-value">{reportData.discountAmount}</strong>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Avg Order Value</span>
                                <strong class="kpi-value">{reportData.avgOrderValue}</strong>
                            </div>
                        </div>
                        <div class="section-card">
                            <div class="section-card-header">
                                <span>Top Selling Items</span>
                            </div>
                            <div class="section-card-body">
                                <template lwc:if={reportData.topItems.length}>
                                    <div class="top-items-list">
                                        <template for:each={reportData.topItems} for:item="row">
                                            <div key={row.itemName} class="top-item">
                                                <span class="top-item-rank">{row.rank}</span>
                                                <div class="top-item-info">
                                                    <div class="top-item-name">{row.itemName}</div>
                                                    <div class="top-item-stats">Qty: {row.quantity} &middot; Revenue: {row.revenue}</div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template lwc:else>
                                    <div class="empty-inline">No sales data for selected dates.</div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </template>
    <template lwc:else>
        <div class="manager-wrap">
            <div class="manager-card">
                <div class="manager-card-header">
                    <h2>Manager Console</h2>
                </div>
                <div class="pad">Manager console is available only on desktop (minimum 1024px width).</div>
            </div>
        </div>
    </template>

    <!-- ═══ EDIT TABLE MODAL ═══ -->
    <template lwc:if={showEditTableModal}>
        <div class="modal-overlay" onclick={closeTableModal} onkeydown={handleTableModalKeydown}>
            <div class="modal-card" onclick={stopPropagation}>
                <div class="modal-header">
                    <h3 class="modal-title">{editModalTitle}</h3>
                    <button type="button" class="modal-close" onclick={closeTableModal}>&times;</button>
                </div>
                <div class="modal-body form-col">
                    <template lwc:if={tableFormError}>
                        <div class="inline-error">{tableFormError}</div>
                    </template>
                    <lightning-input label="Name" name="Name" value={tableForm.Name} onchange={handleTableInput}></lightning-input>
                    <lightning-input type="number" label="Capacity" name="Capacity__c" value={tableForm.Capacity__c} onchange={handleTableInput}></lightning-input>
                    <lightning-input type="number" label="Sort Order" name="Sort_Order__c" value={tableForm.Sort_Order__c} onchange={handleTableInput}></lightning-input>
                    <lightning-combobox label="Status" name="Status__c" value={tableForm.Status__c} options={tableStatusOptions} onchange={handleTableInput}></lightning-combobox>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick={closeTableModal}>Cancel</button>
                    <button type="button" class="btn btn-primary" onclick={saveTable}>Save Table</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ EDIT CATEGORY MODAL ═══ -->
    <template lwc:if={showEditCategoryModal}>
        <div class="modal-overlay" onclick={closeCategoryModal} onkeydown={handleCategoryModalKeydown}>
            <div class="modal-card" onclick={stopPropagation}>
                <div class="modal-header">
                    <h3 class="modal-title">{editModalTitle}</h3>
                    <button type="button" class="modal-close" onclick={closeCategoryModal}>&times;</button>
                </div>
                <div class="modal-body form-col">
                    <template lwc:if={categoryFormError}>
                        <div class="inline-error">{categoryFormError}</div>
                    </template>
                    <lightning-input label="Name" name="Name" value={categoryForm.Name} onchange={handleCategoryInput}></lightning-input>
                    <lightning-input type="number" label="Sort Order" name="Sort_Order__c" value={categoryForm.Sort_Order__c} onchange={handleCategoryInput}></lightning-input>
                    <lightning-input label="Icon" name="Icon__c" value={categoryForm.Icon__c} onchange={handleCategoryInput}></lightning-input>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick={closeCategoryModal}>Cancel</button>
                    <button type="button" class="btn btn-primary" onclick={saveCategory}>Save Category</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ EDIT MENU ITEM MODAL ═══ -->
    <template lwc:if={showEditItemModal}>
        <div class="modal-overlay" onclick={closeItemModal} onkeydown={handleItemModalKeydown}>
            <div class="modal-card modal-card-wide" onclick={stopPropagation}>
                <div class="modal-header">
                    <h3 class="modal-title">{editModalTitle}</h3>
                    <button type="button" class="modal-close" onclick={closeItemModal}>&times;</button>
                </div>
                <div class="modal-body form-col">
                    <template lwc:if={itemFormError}>
                        <div class="inline-error">{itemFormError}</div>
                    </template>
                    <lightning-input label="Name" name="Name" value={itemForm.Name} onchange={handleItemInput}></lightning-input>
                    <lightning-combobox label="Category" name="Menu_Category__c" value={itemForm.Menu_Category__c} options={categoryOptions} onchange={handleItemInput}></lightning-combobox>
                    <lightning-input type="number" label="Price" name="Price__c" value={itemForm.Price__c} onchange={handleItemInput}></lightning-input>
                    <lightning-input label="Description" name="Description__c" value={itemForm.Description__c} onchange={handleItemInput}></lightning-input>
                    <lightning-input type="toggle" label="Available" name="Is_Available__c" checked={itemForm.Is_Available__c} onchange={handleItemInput}></lightning-input>
                    <lightning-input type="checkbox" label="Vegetarian" name="Is_Vegetarian__c" checked={itemForm.Is_Vegetarian__c} onchange={handleItemInput}></lightning-input>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick={closeItemModal}>Cancel</button>
                    <button type="button" class="btn btn-primary" onclick={saveItem}>Save Item</button>
                </div>
            </div>
        </div>
    </template>
</template>
