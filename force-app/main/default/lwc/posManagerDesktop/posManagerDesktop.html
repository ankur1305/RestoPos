<template>
    <template lwc:if={isDesktop}>
        <section class="manager-wrap">
            <div class="manager-card">
                <div class="manager-card-header">
                    <h2>Manager Console</h2>
                </div>
                <div class="toolbar">
                    <div class="manager-head">
                        <h3>Operations Workspace</h3>
                        <p>Manage tables, menu and reporting in one place.</p>
                    </div>
                    <div class="tab-bar">
                        <button type="button" class={tablesTabClass} data-tab="tables" onclick={handleCustomTabChange}>Tables</button>
                        <button type="button" class={menuTabBtnClass} data-tab="menu" onclick={handleCustomTabChange}>Menu</button>
                        <button type="button" class={reportsTabClass} data-tab="reports" onclick={handleCustomTabChange}>Statistics</button>
                    </div>
                </div>

                <template lwc:if={isLoading}>
                    <div class="pad loading-bar">
                        <lightning-spinner size="small" alternative-text="Working"></lightning-spinner>
                    </div>
                </template>

                <!-- ═══ TABLES TAB ═══ -->
                <template lwc:if={isTablesTab}>
                    <div class="pad">
                        <div class="section-toolbar">
                            <h4 class="section-toolbar-title">All Tables</h4>
                            <button type="button" class="btn btn-primary btn-sm" onclick={openNewTable}>+ Add Table</button>
                        </div>

                        <div class="transfer-box">
                            <div class="transfer-field">
                                <lightning-combobox label="Source (active order)" options={occupiedTableOptions} value={transferSourceTableId} onchange={handleTransferSourceChange}></lightning-combobox>
                            </div>
                            <div class="transfer-field">
                                <lightning-combobox label="Target (available)" options={availableTableOptions} value={transferTargetTableId} onchange={handleTransferTargetChange}></lightning-combobox>
                            </div>
                            <div class="field-btn-align">
                                <button type="button" class="btn btn-primary" onclick={transferOrderFromSelectors}>Transfer Order</button>
                            </div>
                        </div>
                        <template lwc:if={transferError}>
                            <div class="inline-error">{transferError}</div>
                        </template>
                        <template lwc:if={tableActionError}>
                            <div class="inline-error">{tableActionError}</div>
                        </template>

                        <div class="list">
                            <template for:each={pagedTablesDisplay} for:item="table">
                                <div key={table.Id} class="list-item">
                                    <div class="list-item-info">
                                        <span class="item-number-badge">{table.tableNumber}</span>
                                        <span class="list-item-name">{table.Name}</span>
                                        <span class="status-badge">{table.Status__c}</span>
                                        <span class="list-item-meta">Cap {table.Capacity__c}</span>
                                    </div>
                                    <div class="list-item-actions">
                                        <button type="button" class="btn btn-sm btn-outline" data-id={table.Id} onclick={editTable}>Edit</button>
                                        <button type="button" class="btn btn-sm btn-subtle-success" data-id={table.Id} data-status="Reserved" onclick={updateTableStatus}>Reserve</button>
                                        <button type="button" class="btn btn-sm btn-subtle" data-id={table.Id} data-status="Available" onclick={updateTableStatus}>Available</button>
                                        <button type="button" class="btn btn-sm btn-subtle-danger" data-id={table.Id} data-status="Out of Service" onclick={updateTableStatus}>Out of Service</button>
                                    </div>
                                </div>
                            </template>
                            <template lwc:if={tables.length}></template>
                            <template lwc:else>
                                <div class="empty-inline">No tables yet. Click "+ Add Table" to create one.</div>
                            </template>
                        </div>
                        <template lwc:if={showTablesPagination}>
                            <div class="pager">
                                <button type="button" class="btn btn-outline" onclick={handleTablesPrev} disabled={disableTablesPrev}>Prev</button>
                                <span class="pager-label">{tablesPageLabel}</span>
                                <button type="button" class="btn btn-outline" onclick={handleTablesNext} disabled={disableTablesNext}>Next</button>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- ═══ MENU TAB ═══ -->
                <template lwc:if={isMenuTab}>
                    <div class="pad">
                        <div class="dual-section">
                            <!-- Categories -->
                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Categories</span>
                                    <button type="button" class="btn btn-sm btn-primary" onclick={openNewCategory}>+ Add</button>
                                </div>
                                <div class="section-card-body list">
                                    <template lwc:if={categoryDeleteError}>
                                        <div class="inline-error">{categoryDeleteError}</div>
                                    </template>
                                    <template for:each={menuCategories} for:item="cat">
                                        <div key={cat.Id} class="list-item compact">
                                            <span class="list-item-name">{cat.Name}</span>
                                            <div class="list-item-actions">
                                                <button type="button" class="btn btn-sm btn-outline" data-id={cat.Id} onclick={editCategory}>Edit</button>
                                                <button type="button" class="btn btn-sm btn-subtle-danger" data-id={cat.Id} onclick={removeCategory}>Delete</button>
                                            </div>
                                        </div>
                                    </template>
                                    <template lwc:if={menuCategories.length}></template>
                                    <template lwc:else>
                                        <div class="empty-inline">No categories found.</div>
                                    </template>
                                </div>
                            </div>

                            <!-- Bulk Actions -->
                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Bulk Availability</span>
                                </div>
                                <div class="section-card-body">
                                    <div class="bulk-row">
                                        <button type="button" class="btn btn-danger" onclick={markAllSoldOut}>Mark All Sold Out</button>
                                        <button type="button" class="btn btn-success" onclick={markAllAvailable}>Reset All Available</button>
                                    </div>
                                    <div class="bulk-row category-sold-row">
                                        <div class="category-filter-field">
                                            <lightning-combobox label="Category" value={selectedCategoryId} options={categoryOptions} onchange={handleCategoryFilter}></lightning-combobox>
                                        </div>
                                        <div class="field-btn-align">
                                            <button type="button" class="btn btn-outline" onclick={markCategorySoldOut}>Mark Category Sold Out</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Menu Items List -->
                        <div class="section-card menu-items-card">
                            <div class="section-card-header">
                                <span>Menu Items</span>
                                <button type="button" class="btn btn-sm btn-primary" onclick={openNewItem}>+ Add Item</button>
                            </div>
                            <div class="section-card-body">
                                <template lwc:if={menuItems.length}>
                                    <div class="menu-grid-head">
                                        <span>#</span>
                                        <span>Item</span>
                                        <span>Price</span>
                                        <span>Category</span>
                                        <span>Status</span>
                                        <span>Actions</span>
                                    </div>
                                    <div class="menu-grid-body">
                                        <template for:each={pagedMenuItemsDisplay} for:item="item">
                                            <div key={item.Id} class="menu-grid-row">
                                                <span class="item-number-badge">{item.itemNumber}</span>
                                                <span class="list-item-name">{item.Name}</span>
                                                <lightning-input
                                                    type="number"
                                                    variant="label-hidden"
                                                    step="0.01"
                                                    name="Price__c"
                                                    data-id={item.Id}
                                                    value={item.Price__c}
                                                    onchange={handleInlineItemChange}
                                                ></lightning-input>
                                                <lightning-combobox
                                                    variant="label-hidden"
                                                    name="Menu_Category__c"
                                                    data-id={item.Id}
                                                    value={item.Menu_Category__c}
                                                    options={categoryOptions}
                                                    onchange={handleInlineItemChange}
                                                ></lightning-combobox>
                                                <span class={item.availabilityClass}>{item.availabilityLabel}</span>
                                                <div class="list-item-actions">
                                                    <button type="button" class={item.toggleClass} data-id={item.Id} onclick={toggleItemAvailability} title="Toggle availability">
                                                        <span class="toggle-thumb"></span>
                                                    </button>
                                                    <button type="button" class="btn btn-sm btn-outline" data-id={item.Id} onclick={saveInlineItem}>Save</button>
                                                    <button type="button" class="btn btn-sm btn-outline" data-id={item.Id} onclick={editItem}>Edit</button>
                                                    <button type="button" class="btn btn-sm btn-subtle-danger" data-id={item.Id} onclick={removeItem}>Delete</button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                    <template lwc:if={showMenuPagination}>
                                        <div class="pager">
                                            <button type="button" class="btn btn-outline" onclick={handleMenuPrev} disabled={disableMenuPrev}>Prev</button>
                                            <span class="pager-label">{menuItemsPageLabel}</span>
                                            <button type="button" class="btn btn-outline" onclick={handleMenuNext} disabled={disableMenuNext}>Next</button>
                                        </div>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <div class="empty-inline">No menu items found.</div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ═══ REPORTS TAB ═══ -->
                <template lwc:if={isReportsTab}>
                    <div class="pad">
                        <div class="report-filters">
                            <div class="filter-field">
                                <lightning-combobox label="Date Preset" value={reportFilters.preset} options={reportPresetOptions} onchange={handleReportPresetChange}></lightning-combobox>
                            </div>
                            <div class="filter-field">
                                <lightning-input type="date" label="Start Date" name="startDate" value={reportFilters.startDate} onchange={handleFilterChange} disabled={isPresetManagedDates}></lightning-input>
                            </div>
                            <div class="filter-field">
                                <lightning-input type="date" label="End Date" name="endDate" value={reportFilters.endDate} onchange={handleFilterChange} disabled={isPresetManagedDates}></lightning-input>
                            </div>
                            <div class="filter-field">
                                <lightning-combobox label="Category" name="categoryId" value={reportFilters.categoryId} options={reportCategoryOptions} onchange={handleFilterChange}></lightning-combobox>
                            </div>
                            <div class="filter-field">
                                <lightning-combobox label="Payment Method" name="paymentMethod" value={reportFilters.paymentMethod} options={paymentMethodOptions} onchange={handleFilterChange}></lightning-combobox>
                            </div>
                            <div class="field-btn-align">
                                <button type="button" class="btn btn-primary" onclick={applyReportFilter}>Apply Filters</button>
                                <button type="button" class="btn btn-outline" onclick={refreshStatistics}>Refresh</button>
                                <button type="button" class="btn btn-outline" onclick={exportReportCsv}>Export Excel</button>
                            </div>
                        </div>
                        <div class="kpis">
                            <div class="kpi">
                                <span class="kpi-label">Orders</span>
                                <strong class="kpi-value">{reportData.summary.orderCount}</strong>
                                <small class="kpi-delta">vs prev {reportData.comparison.orderDeltaPercent}%</small>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Revenue</span>
                                <strong class="kpi-value">{reportData.summary.revenue}</strong>
                                <small class="kpi-delta">vs prev {reportData.comparison.revenueDeltaPercent}%</small>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Net Sales (excl. tax)</span>
                                <strong class="kpi-value">{reportData.summary.netSales}</strong>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Avg Order Value</span>
                                <strong class="kpi-value">{reportData.summary.avgOrderValue}</strong>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Tax</span>
                                <strong class="kpi-value">{reportData.summary.taxAmount}</strong>
                                <small class="kpi-delta">CGST {reportData.summary.cgstAmount} | SGST {reportData.summary.sgstAmount}</small>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Unpaid Served/Closed</span>
                                <strong class="kpi-value">{reportData.exceptions.unpaidOrderCount}</strong>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Cancellation Rate</span>
                                <strong class="kpi-value">{reportData.exceptions.cancellationRatePercent}%</strong>
                            </div>
                            <div class="kpi">
                                <span class="kpi-label">Sold Out Items</span>
                                <strong class="kpi-value">{reportData.exceptions.soldOutItemCount}</strong>
                            </div>
                        </div>

                        <div class="reports-grid">
                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Hourly Trend</span>
                                </div>
                                <div class="section-card-body">
                                    <template lwc:if={reportData.hourlyTrend.length}>
                                        <div class="report-mini-list">
                                            <template for:each={pagedHourlyTrend} for:item="row">
                                                <div key={row.label} class="report-mini-row">
                                                    <span>{row.label}</span>
                                                    <span>{row.orderCount} orders</span>
                                                    <span>{row.revenue}</span>
                                                </div>
                                            </template>
                                        </div>
                                        <template lwc:if={showHourlyPagination}>
                                            <div class="pager">
                                                <button type="button" class="btn btn-outline" onclick={handleHourlyPrev} disabled={disableHourlyPrev}>Prev</button>
                                                <span class="pager-label">{hourlyTrendPageLabel}</span>
                                                <button type="button" class="btn btn-outline" onclick={handleHourlyNext} disabled={disableHourlyNext}>Next</button>
                                            </div>
                                        </template>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-inline">No hourly data in selected range.</div>
                                    </template>
                                </div>
                            </div>

                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Daily Trend</span>
                                </div>
                                <div class="section-card-body">
                                    <template lwc:if={reportData.dailyTrend.length}>
                                        <div class="report-mini-list">
                                            <template for:each={pagedDailyTrend} for:item="row">
                                                <div key={row.dateLabel} class="report-mini-row">
                                                    <span>{row.dateLabel}</span>
                                                    <span>{row.orderCount} orders</span>
                                                    <span>{row.revenue}</span>
                                                </div>
                                            </template>
                                        </div>
                                        <template lwc:if={showDailyPagination}>
                                            <div class="pager">
                                                <button type="button" class="btn btn-outline" onclick={handleDailyPrev} disabled={disableDailyPrev}>Prev</button>
                                                <span class="pager-label">{dailyTrendPageLabel}</span>
                                                <button type="button" class="btn btn-outline" onclick={handleDailyNext} disabled={disableDailyNext}>Next</button>
                                            </div>
                                        </template>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-inline">No daily trend data.</div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="reports-grid">
                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Category Mix</span>
                                </div>
                                <div class="section-card-body">
                                    <template lwc:if={reportData.categoryMix.length}>
                                        <div class="report-mini-list">
                                            <template for:each={reportData.categoryMix} for:item="row">
                                                <div key={row.categoryName} class="report-mini-row">
                                                    <span class={row.categoryNameClass}>{row.categoryName}</span>
                                                    <span>{row.orderCount} orders</span>
                                                    <span>{row.revenue}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-inline">No category mix for selected filters.</div>
                                    </template>
                                </div>
                            </div>

                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Payment Mix</span>
                                </div>
                                <div class="section-card-body">
                                    <template lwc:if={reportData.paymentMix.length}>
                                        <div class="report-mini-list">
                                            <template for:each={reportData.paymentMix} for:item="row">
                                                <div key={row.paymentMethod} class="report-mini-row">
                                                    <span>{row.paymentMethod}</span>
                                                    <span>{row.orderCount} orders</span>
                                                    <span>{row.revenue}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-inline">No payment data for selected filters.</div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="reports-grid">
                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Top Selling Items</span>
                                </div>
                                <div class="section-card-body">
                                    <template lwc:if={reportData.topItems.length}>
                                        <div class="top-items-list">
                                            <template for:each={reportData.topItems} for:item="row">
                                                <div key={row.itemName} class="top-item">
                                                    <span class="top-item-rank">{row.rank}</span>
                                                    <div class="top-item-info">
                                                        <div class="top-item-name">{row.itemName}</div>
                                                        <div class="top-item-stats">Qty: {row.quantity} &middot; Revenue: {row.revenue}</div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-inline">No sales data for selected dates.</div>
                                    </template>
                                </div>
                            </div>

                            <div class="section-card">
                                <div class="section-card-header">
                                    <span>Slow Moving Items</span>
                                </div>
                                <div class="section-card-body">
                                    <template lwc:if={reportData.slowItems.length}>
                                        <div class="top-items-list">
                                            <template for:each={reportData.slowItems} for:item="row">
                                                <div key={row.itemName} class="top-item">
                                                    <span class="top-item-rank">{row.rank}</span>
                                                    <div class="top-item-info">
                                                        <div class="top-item-name">{row.itemName}</div>
                                                        <div class="top-item-stats">Qty: {row.quantity} &middot; Revenue: {row.revenue}</div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-inline">No slow item data for selected range.</div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="section-card">
                            <div class="section-card-header">
                                <span>Order Details</span>
                            </div>
                            <div class="section-card-body">
                                <div class="order-table-filters">
                                    <div class="filter-field">
                                        <lightning-combobox
                                            label="Payment"
                                            name="paymentMethod"
                                            value={orderTableFilters.paymentMethod}
                                            options={orderDetailsPaymentFilterOptions}
                                            onchange={handleOrderTableFilterChange}
                                        ></lightning-combobox>
                                    </div>
                                    <div class="filter-field">
                                        <lightning-combobox
                                            label="Status"
                                            name="status"
                                            value={orderTableFilters.status}
                                            options={orderDetailsStatusFilterOptions}
                                            onchange={handleOrderTableFilterChange}
                                        ></lightning-combobox>
                                    </div>
                                </div>
                                <template lwc:if={filteredOrderDetails.length}>
                                    <div class="orders-table-wrap">
                                        <div class="orders-table-head">
                                            <span>Order</span>
                                            <span>Date/Time</span>
                                            <span>Table</span>
                                            <span>Status</span>
                                            <span>Payment</span>
                                            <span>Items</span>
                                            <span>Total</span>
                                        </div>
                                        <div class="orders-table-body">
                                            <template for:each={pagedOrderDetails} for:item="row">
                                                <button key={row.orderId} type="button" class="orders-table-row" data-id={row.orderId} onclick={openOrderDetailsModal}>
                                                    <span>{row.orderName}</span>
                                                    <span>{row.orderDateTimeLabel}</span>
                                                    <span>{row.tableName}</span>
                                                    <span>{row.status}</span>
                                                    <span>{row.paymentMethod}</span>
                                                    <span>{row.itemCount}</span>
                                                    <span>{row.totalAmount}</span>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                    <template lwc:if={showOrderPagination}>
                                        <div class="pager">
                                            <button type="button" class="btn btn-outline" onclick={handleOrderPrev} disabled={disableOrderPrev}>Prev</button>
                                            <span class="pager-label">{orderDetailsPageLabel}</span>
                                            <button type="button" class="btn btn-outline" onclick={handleOrderNext} disabled={disableOrderNext}>Next</button>
                                        </div>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <div class="empty-inline">No order details available for selected filters.</div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </template>
    <template lwc:else>
        <div class="manager-wrap">
            <div class="manager-card">
                <div class="manager-card-header">
                    <h2>Manager Console</h2>
                </div>
                <div class="pad">Manager console is available only on desktop (minimum 1024px width).</div>
            </div>
        </div>
    </template>

    <!-- ═══ EDIT TABLE MODAL ═══ -->
    <template lwc:if={showEditTableModal}>
        <div class="modal-overlay" onclick={closeTableModal} onkeydown={handleTableModalKeydown}>
            <div class="modal-card" onclick={stopPropagation}>
                <div class="modal-header">
                    <h3 class="modal-title">{editModalTitle}</h3>
                    <button type="button" class="modal-close" onclick={closeTableModal}>&times;</button>
                </div>
                <div class="modal-body form-col">
                    <template lwc:if={tableFormError}>
                        <div class="inline-error">{tableFormError}</div>
                    </template>
                    <lightning-input label="Name" name="Name" value={tableForm.Name} onchange={handleTableInput}></lightning-input>
                    <lightning-input type="number" label="Capacity" name="Capacity__c" value={tableForm.Capacity__c} onchange={handleTableInput}></lightning-input>
                    <lightning-input type="number" label="Sort Order" name="Sort_Order__c" value={tableForm.Sort_Order__c} onchange={handleTableInput}></lightning-input>
                    <lightning-combobox label="Status" name="Status__c" value={tableForm.Status__c} options={tableStatusOptions} onchange={handleTableInput}></lightning-combobox>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick={closeTableModal}>Cancel</button>
                    <button type="button" class="btn btn-primary" onclick={saveTable}>Save Table</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ EDIT CATEGORY MODAL ═══ -->
    <template lwc:if={showEditCategoryModal}>
        <div class="modal-overlay" onclick={closeCategoryModal} onkeydown={handleCategoryModalKeydown}>
            <div class="modal-card" onclick={stopPropagation}>
                <div class="modal-header">
                    <h3 class="modal-title">{editModalTitle}</h3>
                    <button type="button" class="modal-close" onclick={closeCategoryModal}>&times;</button>
                </div>
                <div class="modal-body form-col">
                    <template lwc:if={categoryFormError}>
                        <div class="inline-error">{categoryFormError}</div>
                    </template>
                    <lightning-input label="Name" name="Name" value={categoryForm.Name} onchange={handleCategoryInput}></lightning-input>
                    <lightning-input type="number" label="Sort Order" name="Sort_Order__c" value={categoryForm.Sort_Order__c} onchange={handleCategoryInput}></lightning-input>
                    <lightning-input label="Icon" name="Icon__c" value={categoryForm.Icon__c} onchange={handleCategoryInput}></lightning-input>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick={closeCategoryModal}>Cancel</button>
                    <button type="button" class="btn btn-primary" onclick={saveCategory}>Save Category</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ EDIT MENU ITEM MODAL ═══ -->
    <template lwc:if={showEditItemModal}>
        <div class="modal-overlay" onclick={closeItemModal} onkeydown={handleItemModalKeydown}>
            <div class="modal-card modal-card-wide" onclick={stopPropagation}>
                <div class="modal-header">
                    <h3 class="modal-title">{editModalTitle}</h3>
                    <button type="button" class="modal-close" onclick={closeItemModal}>&times;</button>
                </div>
                <div class="modal-body form-col">
                    <template lwc:if={itemFormError}>
                        <div class="inline-error">{itemFormError}</div>
                    </template>
                    <lightning-input label="Name" name="Name" value={itemForm.Name} onchange={handleItemInput}></lightning-input>
                    <lightning-combobox label="Category" name="Menu_Category__c" value={itemForm.Menu_Category__c} options={categoryOptions} onchange={handleItemInput}></lightning-combobox>
                    <lightning-input type="number" label="Price" name="Price__c" value={itemForm.Price__c} onchange={handleItemInput}></lightning-input>
                    <lightning-input label="Description" name="Description__c" value={itemForm.Description__c} onchange={handleItemInput}></lightning-input>
                    <lightning-input type="toggle" label="Available" name="Is_Available__c" checked={itemForm.Is_Available__c} onchange={handleItemInput}></lightning-input>
                    <lightning-input type="checkbox" label="Vegetarian" name="Is_Vegetarian__c" checked={itemForm.Is_Vegetarian__c} onchange={handleItemInput}></lightning-input>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick={closeItemModal}>Cancel</button>
                    <button type="button" class="btn btn-primary" onclick={saveItem}>Save Item</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ ORDER DETAILS MODAL ═══ -->
    <template lwc:if={showOrderDetailsModal}>
        <div class="modal-overlay" onclick={closeOrderDetailsModal} onkeydown={handleOrderDetailsModalKeydown}>
            <div class="modal-card modal-card-xl" onclick={stopPropagation}>
                <div class="modal-header">
                    <h3 class="modal-title">Order {selectedOrderDetail.orderName}</h3>
                    <button type="button" class="modal-close" onclick={closeOrderDetailsModal}>&times;</button>
                </div>
                <div class="modal-body">
                    <div class="order-modal-grid">
                        <div><strong>Status:</strong> {selectedOrderDetail.status}</div>
                        <div><strong>Date/Time:</strong> {selectedOrderDetail.orderDateTimeLabel}</div>
                        <div><strong>Table:</strong> {selectedOrderDetail.tableName}</div>
                        <div><strong>Customer:</strong> {selectedOrderDetail.customerName}</div>
                        <div><strong>Phone:</strong> {selectedOrderDetail.customerPhone}</div>
                        <div><strong>Payment Method:</strong> {selectedOrderDetail.paymentMethod}</div>
                        <div><strong>Payment Status:</strong> {selectedOrderDetail.paymentStatus}</div>
                        <div><strong>Subtotal:</strong> {selectedOrderDetail.subtotal}</div>
                        <div><strong>Discount:</strong> {selectedOrderDetail.discountAmount}</div>
                        <div><strong>Tax:</strong> {selectedOrderDetail.taxAmount}</div>
                        <div><strong>Total:</strong> {selectedOrderDetail.totalAmount}</div>
                        <div><strong>Items:</strong> {selectedOrderDetail.itemCount}</div>
                    </div>

                    <template lwc:if={selectedOrderDetail.notes}>
                        <div class="order-note"><strong>Order Notes:</strong> {selectedOrderDetail.notes}</div>
                    </template>

                    <div class="order-lines-table">
                        <div class="order-lines-head">
                            <span>Item</span>
                            <span>Qty</span>
                            <span>Unit Price</span>
                            <span>Line Total</span>
                            <span>Status</span>
                            <span>Notes</span>
                        </div>
                        <div class="order-lines-body">
                            <template for:each={selectedOrderDetail.lineItems} for:item="line">
                                <div key={line.rowKey} class="order-lines-row">
                                    <span>{line.itemName}</span>
                                    <span>{line.quantity}</span>
                                    <span>{line.unitPrice}</span>
                                    <span>{line.lineTotal}</span>
                                    <span>{line.status}</span>
                                    <span>{line.notes}</span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick={closeOrderDetailsModal}>Close</button>
                </div>
            </div>
        </div>
    </template>
</template>
