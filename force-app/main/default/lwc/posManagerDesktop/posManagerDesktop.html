<template>
    <section class="manager-wrap">
        <div class="manager-card">
            <div class="manager-card-header">
                <h2>Manager Console</h2>
            </div>
            <div class="toolbar">
                <div class="manager-head">
                    <h3>Operations Workspace</h3>
                    <p>Manage tables, menu and reporting in one place.</p>
                </div>
                <div class="tab-bar">
                    <button type="button" class={tablesTabClass} data-tab="tables" onclick={handleCustomTabChange}>Tables</button>
                    <button type="button" class={menuTabBtnClass} data-tab="menu" onclick={handleCustomTabChange}>Menu</button>
                    <button type="button" class={reportsTabClass} data-tab="reports" onclick={handleCustomTabChange}>Statistics</button>
                </div>
            </div>

            <template lwc:if={isTablesTab}>
                <c-pos-manager-tables restaurant-id={restaurantId}></c-pos-manager-tables>
            </template>

            <template lwc:if={isMenuTab}>
                <c-pos-manager-menu restaurant-id={restaurantId}></c-pos-manager-menu>
            </template>

            <template lwc:if={isReportsTab}>
                <c-pos-manager-stats restaurant-id={restaurantId} currency-code={currencyCode}></c-pos-manager-stats>
            </template>
        </div>
    </section>
</template>
