<template>
    <div class="order-screen">
        <!-- Mobile tab toggle (hidden on desktop) -->
        <div class="mobile-tabs">
            <button class={menuTabClass} onclick={handleMobileTabMenu}>Menu</button>
            <button class={cartTabClass} onclick={handleMobileTabCart}>{cartTabLabel}</button>
            <button class="mobile-tab back-tab" onclick={handleBack}>Tables</button>
        </div>
        <template lwc:if={inlineToastMessage}>
            <div class={inlineToastClass} role="status" aria-live="polite">
                <span>{inlineToastMessage}</span>
                <button type="button" class="inline-toast-close" onclick={dismissInlineToast} aria-label="Dismiss message">&times;</button>
            </div>
        </template>

        <div class={layoutClass}>
            <div class="menu-panel" data-mobile-tab="menu">
                <div class="panel-header panel-header-desktop">
                    <h3 class="panel-title">Menu</h3>
                    <p class="panel-subtitle">Browse categories and add items quickly</p>
                </div>
                <c-pos-menu-browser
                    restaurant-id={restaurantId}
                    currency-code={currencyCode}
                    cart-item-quantities={cartItemQuantities}
                    onadditem={handleAddItem}
                    onadjustitemqty={handleAdjustItemQty}
                ></c-pos-menu-browser>
            </div>

            <div class="order-panel" data-mobile-tab="cart">
                <div class="order-header">
                    <div class="order-info">
                        <h3 class="order-title">{orderName}</h3>
                        <span class="order-table">Table: {tableName}</span>
                    </div>
                    <button class="back-btn desktop-only" onclick={handleBack}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        Tables
                    </button>
                </div>

                <div class="customer-section">
                    <template lwc:if={hasCustomer}>
                        <div class="customer-card">
                            <div class="customer-linked">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                                <span class="customer-linked-name">{customerName}</span>
                                <button type="button" class="remove-customer-btn" onclick={handleRemoveCustomer} aria-label="Remove customer">&times;</button>
                            </div>
                            <template lwc:if={customerPhoneDisplay}>
                                <div class="customer-phone-line">
                                    <span class="customer-field-label">Phone</span>
                                    <span class="customer-phone-value">{customerPhoneDisplay}</span>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="customer-action-row">
                            <button type="button" class="action-btn secondary add-customer-btn" onclick={openCustomerModal} disabled={skipCustomer}>Add Customer</button>
                            <label class="skip-customer-label">
                                <input type="checkbox" checked={skipCustomer} onchange={handleSkipCustomerChange} />
                                <span>Skip</span>
                            </label>
                        </div>
                    </template>
                </div>

                <div class="order-notes-section">
                    <label class="notes-label" for="order-notes">Order Notes</label>
                    <textarea
                        id="order-notes"
                        class="notes-textarea"
                        placeholder="e.g., no onions, birthday table, allergy info…"
                        value={orderNotes}
                        onchange={handleNotesChange}
                        oninput={handleNotesChange}
                        maxlength="500"
                        rows="2"
                    ></textarea>
                </div>

                <div class="order-items-list">
                    <template lwc:if={hasItems}>
                        <template for:each={orderItems} for:item="item">
                            <c-pos-order-item
                                key={item.Id}
                                item={item}
                                currency-code={currencyCode}
                                onremoveitem={handleRemoveItem}
                                onupdatequantity={handleUpdateQuantity}
                            ></c-pos-order-item>
                        </template>
                    </template>
                    <template lwc:else>
                        <div class="empty-order">
                            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#cbd5e1" stroke-width="1.5">
                                <path d="M6 6h6l4 24h18l4-16H14"/>
                                <circle cx="18" cy="38" r="3"/>
                                <circle cx="34" cy="38" r="3"/>
                                <path d="M26 16v8M22 20h8" stroke-dasharray="3 3" stroke="#6b7280"/>
                            </svg>
                            <p>No items in cart yet</p>
                            <small>Open Menu tab and tap an item to get started.</small>
                        </div>
                    </template>
                </div>

                <div class="order-footer">
                    <div class="totals-section">
                        <div class="total-row">
                            <span>Subtotal</span>
                            <span>{formattedSubtotal}</span>
                        </div>
                        <div class="total-row">
                            <span>CGST ({halfTaxRate}%)</span>
                            <span>{formattedCgst}</span>
                        </div>
                        <div class="total-row">
                            <span>SGST ({halfTaxRate}%)</span>
                            <span>{formattedSgst}</span>
                        </div>
                        <template lwc:if={hasDiscount}>
                            <div class="total-row discount-row">
                                <span>Discount ({discountPercent}%)</span>
                                <span>{formattedDiscount}</span>
                            </div>
                        </template>
                        <div class="total-row grand-total">
                            <span>Total</span>
                            <span>{formattedTotal}</span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button type="button" class="action-btn danger" onclick={handleShowCancelConfirm} disabled={noItems}>
                            Cancel Order
                        </button>
                        <button type="button" class="action-btn primary generate-bill-btn" onclick={handleGenerateBill} disabled={generateBillDisabled}>
                            Generate Bill
                        </button>
                    </div>
                    <template lwc:if={showGenerateBillHint}>
                        <div class="generate-bill-hint">{generateBillBlockReason}</div>
                    </template>
                </div>

                <!-- Cancel Confirmation Modal -->
                <template lwc:if={showCancelConfirm}>
                    <div class="modal-overlay" onclick={handleCloseCancelConfirm}>
                        <div class="modal-card" role="dialog" aria-modal="true" aria-label="Cancel order confirmation" onclick={stopPropagation}>
                            <h3 class="modal-title">Cancel Order?</h3>
                            <div class="modal-body">
                                <p class="confirm-text">Are you sure you want to cancel this order? This action cannot be undone.</p>
                            </div>
                            <div class="modal-actions">
                                <button class="action-btn secondary" onclick={handleCloseCancelConfirm}>Go Back</button>
                                <button class="action-btn danger cancel-confirm-primary" onclick={handleCancelOrder}>Yes, Cancel</button>
                            </div>
                        </div>
                    </div>
                </template>

                <template lwc:if={showCustomerModal}>
                    <div class="modal-overlay" onclick={closeCustomerModal}>
                        <div class="modal-card" role="dialog" aria-modal="true" aria-label="Add customer details" onclick={stopPropagation}>
                            <h3 class="modal-title">Add Customer</h3>
                            <div class="modal-body">
                                <c-pos-customer-input
                                    restaurant-id={restaurantId}
                                    oncustomerchange={handleCustomerChange}
                                ></c-pos-customer-input>
                            </div>
                            <div class="modal-actions">
                                <button class="action-btn secondary" onclick={closeCustomerModal}>Close</button>
                            </div>
                        </div>
                    </div>
                </template>

            </div>
        </div>
    </div>
</template>
