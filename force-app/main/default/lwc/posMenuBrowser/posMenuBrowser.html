<template>
    <div class="menu-browser">
        <div class="menu-search">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input
                class="search-input"
                type="text"
                placeholder="Search menu items..."
                value={searchTerm}
                oninput={handleSearch}
            />
        </div>
        <div class="menu-section-head">
            <h4>Menu</h4>
            <span>Browse categories and add items quickly</span>
        </div>

        <div class="category-tabs">
            <template for:each={categoriesWithClass} for:item="cat">
                <button key={cat.Id}
                        class={cat.tabClass}
                        data-id={cat.Id}
                        onclick={handleCategoryClick}>
                    {cat.Name}
                </button>
            </template>
        </div>

        <div class="menu-items-list">
            <template lwc:if={isLoading}>
                <div class="skeleton-row">
                    <div class="skeleton-dot"></div>
                    <div class="skeleton-text"><div class="skeleton-line skeleton-line-long"></div><div class="skeleton-line skeleton-line-short"></div></div>
                    <div class="skeleton-price"></div>
                </div>
                <div class="skeleton-row">
                    <div class="skeleton-dot"></div>
                    <div class="skeleton-text"><div class="skeleton-line skeleton-line-long"></div><div class="skeleton-line skeleton-line-short"></div></div>
                    <div class="skeleton-price"></div>
                </div>
                <div class="skeleton-row">
                    <div class="skeleton-dot"></div>
                    <div class="skeleton-text"><div class="skeleton-line skeleton-line-long"></div><div class="skeleton-line skeleton-line-short"></div></div>
                    <div class="skeleton-price"></div>
                </div>
                <div class="skeleton-row">
                    <div class="skeleton-dot"></div>
                    <div class="skeleton-text"><div class="skeleton-line skeleton-line-long"></div><div class="skeleton-line skeleton-line-short"></div></div>
                    <div class="skeleton-price"></div>
                </div>
                <div class="skeleton-row">
                    <div class="skeleton-dot"></div>
                    <div class="skeleton-text"><div class="skeleton-line skeleton-line-long"></div><div class="skeleton-line skeleton-line-short"></div></div>
                    <div class="skeleton-price"></div>
                </div>
            </template>
            <template lwc:elseif={hasItems}>
                <template for:each={items} for:item="item">
                    <div key={item.Id} class={item.itemClass} data-id={item.Id} data-available={item.Is_Available__c} onclick={handleAddItem}>
                        <div class="item-left">
                            <span class="veg-indicator">
                                <template lwc:if={item.Is_Vegetarian__c}>
                                    <span class="veg-dot"></span>
                                </template>
                                <template lwc:else>
                                    <span class="non-veg-dot"></span>
                                </template>
                            </span>
                            <div class="item-info">
                                <span class="item-name">{item.Name}</span>
                                <template lwc:if={item.Is_Available__c}>
                                    <span class="availability-tag">Available</span>
                                </template>
                                <template lwc:else>
                                    <span class="availability-tag sold-out-tag">Sold out</span>
                                </template>
                                <template lwc:if={item.Description__c}>
                                    <span class="item-desc">{item.Description__c}</span>
                                </template>
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="item-price">₹{item.Price__c}</span>
                            <template lwc:if={item.inCartQty}>
                                <div class="qty-inline-controls">
                                    <button type="button" class="qty-inline-btn" data-id={item.Id} onclick={handleDecrementItem}>−</button>
                                    <span class="qty-inline-value">{item.inCartQty}</span>
                                    <button type="button" class="qty-inline-btn" data-id={item.Id} onclick={handleIncrementItem}>+</button>
                                </div>
                            </template>
                            <template lwc:else>
                                <button class="add-btn" disabled={item.isDisabled}>+</button>
                            </template>
                        </div>
                    </div>
                </template>
            </template>
            <template lwc:else>
                <div class="empty-menu">
                    <svg width="40" height="40" viewBox="0 0 48 48" fill="none" stroke="#94a3b8" stroke-width="1.5">
                        <circle cx="20" cy="20" r="14"/>
                        <path d="M38 38l-8-8"/>
                        <path d="M15 20h10M20 15v10" stroke-dasharray="3 3"/>
                    </svg>
                    <h5>No items found</h5>
                    <p>Try another category or clear the search.</p>
                </div>
            </template>

        </div>
    </div>
</template>
